name: Daily Newsletter Briefing (example)

# Example workflow for Gmail-based daily jobs.
# Add your own schedule cron once senders and prompts are configured.
# See README.md for setup.

on:
  workflow_dispatch:

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  briefings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run newsletter briefings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODELS: ${{ secrets.GEMINI_MODELS }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python run.py --group daily
